<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login – KnowledgeCache</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .card {
    background: #fff;
    padding: 40px 36px;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 400px;
  }

  h2 {
    font-size: 22px;
    margin-bottom: 6px;
    color: #1a1a2e;
  }

  .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: bold;
    color: #444;
    margin-bottom: 5px;
  }

  input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    margin-bottom: 18px;
    outline: none;
    transition: border 0.2s;
  }

  input:focus { border-color: #4a90e2; }

  button {
    width: 100%;
    padding: 11px;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
  }

  button:hover { background: #2d2d5e; }

  .error {
    background: #ffeaea;
    color: #c0392b;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: #666;
  }

  .footer a { color: #4a90e2; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to KnowledgeCacheOfHumanity</p>

  <div class="error" id="errorMsg"></div>

  <label for="username">Username</label>
  <input type="text" id="username" placeholder="Enter your username" autocomplete="username">

  <label for="password">Password</label>
  <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">

  <button onclick="doLogin()">Sign In</button>

  <div class="footer">
    Don't have an account? <a href="signup.html">Sign up</a>
  </div>
</div>

<script>
async function doLogin() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const errorEl  = document.getElementById("errorMsg");

  errorEl.style.display = "none";

  if (!username || !password) {
    errorEl.textContent = "Please fill in all fields.";
    errorEl.style.display = "block";
    return;
  }

  const res = await fetch("http://127.0.0.1:8000/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (!res.ok) {
    errorEl.textContent = data.error || "Login failed.";
    errorEl.style.display = "block";
    return;
  }

  localStorage.setItem("token", data.token);
  localStorage.setItem("username", data.username);
  window.location.href = "index.html";
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});
</script>

</body>
</html>
